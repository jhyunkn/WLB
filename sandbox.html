<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{touch-action:manipulation;overscroll-behavior:none}body{margin:0;min-height:100vh;font-family:"Courier New","Microsoft YaHei",monospace;color:#172033;background:linear-gradient(180deg,#edf7fb,#f8fbff)}button,input{font-family:inherit;touch-action:manipulation}button{user-select:none}.shell{width:min(100%,480px);margin:0 auto;padding:12px 10px 30px}.topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}.brand{font-size:12px;font-weight:900;color:#53677a}.back{text-decoration:none;border:1px solid #d9e2eb;border-radius:999px;background:#fff;padding:7px 11px;color:#667386;font-size:11px;font-weight:900}.hero{text-align:center;margin-bottom:12px}.hero h1{font-size:clamp(28px,8vw,52px);letter-spacing:-.06em;line-height:.95;margin:0 0 8px}.hero p{margin:0;color:#425064;font-size:13px;line-height:1.55}.gameboy{width:min(100%,420px);min-height:690px;margin:0 auto;background:linear-gradient(145deg,#eceee7,#c8ccc3);border:2px solid #aeb3aa;border-radius:34px 34px 78px 34px;padding:22px 18px 24px;box-shadow:0 28px 70px rgba(20,40,70,.18);position:relative}.gameboy:after{content:"";position:absolute;right:26px;bottom:22px;width:74px;height:10px;border-radius:999px;background:#989d95;transform:rotate(-32deg);opacity:.6}.top{display:flex;justify-content:space-between;color:#606860;font-size:10px;font-weight:900;margin-bottom:12px}.led{display:inline-block;width:8px;height:8px;background:#9b1c31;border-radius:50%;box-shadow:0 0 10px #9b1c31;margin-right:6px}.screen-wrap{background:#2b3030;border-radius:22px;padding:12px;border:5px solid #747873}.screen{height:356px;background:#9bbc0f;border:4px solid #203b22;color:#306230;overflow:hidden;position:relative}.screen.flash{animation:flash .18s linear 2}@keyframes flash{50%{filter:brightness(1.2)}}.hud{display:grid;grid-template-columns:repeat(5,1fr);border-bottom:3px solid #306230;padding:7px 8px;font-size:10px;font-weight:900;text-align:center}.field{height:216px;position:relative;background-image:linear-gradient(rgba(48,98,48,.16) 1px,transparent 1px),linear-gradient(90deg,rgba(48,98,48,.16) 1px,transparent 1px);background-size:24px 24px}.player,.item,.wall,.enemy,.trail{position:absolute;width:24px;height:24px;display:grid;place-items:center;font-size:15px;font-weight:900;line-height:1}.player{background:#306230;color:#9bbc0f;z-index:5}.item{z-index:3;animation:blink 1.1s steps(2,end) infinite}.wall{background:rgba(48,98,48,.62)}.enemy{background:rgba(48,98,48,.22);border:2px solid #306230;z-index:4}.trail{color:#306230;z-index:2;animation:flicker .7s steps(2,end) infinite}@keyframes blink{50%{opacity:.45}}@keyframes flicker{50%{opacity:.65;transform:translateY(1px)}}.msg{height:54px;border-top:3px solid #306230;padding:8px 10px;font-size:11px;line-height:1.38;font-weight:900;background:rgba(48,98,48,.08)}.logbox{height:58px;border-top:2px solid rgba(48,98,48,.28);padding:7px 10px;font-size:10px;line-height:1.35;font-weight:900;overflow:hidden;background:rgba(48,98,48,.1)}.popup{position:absolute;inset:42px 16px 70px;background:rgba(155,188,15,.96);border:4px double #306230;z-index:20;display:none;padding:18px;color:#306230;font-weight:900;text-align:center}.popup.show{display:grid;place-items:center}.popInner{max-width:300px}.popTitle{font-size:22px;margin-bottom:10px}.popText{font-size:13px;line-height:1.55;margin-bottom:14px}.popBtn{border:2px solid #306230;background:#306230;color:#9bbc0f;padding:9px 14px;border-radius:0;font-weight:900}.namebar{display:flex;align-items:center;gap:8px;justify-content:center;margin-top:14px}.namebar label{font-size:12px;font-weight:900;color:#58605a}.namebar input{width:110px;padding:9px 11px;border:1px solid #97a493;border-radius:999px;background:#f5f6f2;text-align:center;font-size:13px;font-weight:900;color:#172033}.namebar button{border:none;border-radius:999px;padding:9px 12px;background:#777d76;color:#fff;font-weight:900;box-shadow:0 4px 0 #474c48;cursor:pointer}.controls{display:grid;grid-template-columns:1fr 1fr;align-items:center;margin-top:18px}.dpad{width:154px;height:154px;position:relative}.dpad button,.ab button,.small button{cursor:pointer;border:none}.dpad button{position:absolute;background:#25292b;color:#fff;border-radius:10px;box-shadow:0 5px 0 #111;font-weight:900}.up,.down{left:52px;width:50px;height:52px}.up{top:0}.down{bottom:0}.left,.right{top:52px;width:52px;height:50px}.left{left:0}.right{right:0}.mid{left:52px;top:52px;width:50px;height:50px;box-shadow:none!important}.ab{display:flex;justify-content:flex-end;gap:16px}.ab button{width:60px;height:60px;border-radius:50%;background:#9b1c31;color:#fff;font-weight:900;box-shadow:0 6px 0 #56101c}.small{display:flex;gap:12px;justify-content:center;margin-top:16px}.small button{border-radius:999px;background:#777d76;color:#fff;padding:9px 20px;font-weight:900;box-shadow:0 4px 0 #474c48}.rule{margin-top:16px;text-align:center;color:#667386;font-size:11px;line-height:1.45}.foot{text-align:center;color:#667386;font-size:11px;margin-top:14px}@media(max-width:420px){.shell{padding:10px 8px 24px}.gameboy{padding:16px 14px 20px;min-height:658px}.screen{height:340px}.field{height:202px}.hud{font-size:9px;padding:6px}.msg{font-size:10px}.dpad{transform:scale(.84);transform-origin:left center}.ab button{width:54px;height:54px}.popup{inset:38px 12px 62px}}
</style>

<body>
<div class="shell"><div class="topbar"><div class="brand">WLB · 第四页 · 1988时光游戏机</div><a class="back" href="./index.html">← 返回目录</a></div><div class="hero"><h1>1988 时光收集机</h1><p>收集全部记忆即可过关。尾巴是危险的：碰到自己的火焰尾巴就失败。</p></div><section class="gameboy"><div class="top"><span>DOT MATRIX SOUND</span><span><i class="led"></i>电源</span></div><div class="screen-wrap"><div id="screen" class="screen"><div class="hud"><div>主角<br><span id="heroHud">小</span></div><div>关卡<br><span id="level">1</span>/5</div><div>记忆<br><span id="score">0</span>/<span id="need">4</span></div><div>尾巴<br><span id="tailLen">0</span></div><div>能量<br><span id="energy">99</span></div></div><div id="field" class="field"><div id="player" class="player">小</div></div><div id="popup" class="popup"><div class="popInner"><div id="popTitle" class="popTitle"></div><div id="popText" class="popText"></div><button id="popBtn" class="popBtn" onclick="closePopup()">A / 继续</button></div></div><div id="msg" class="msg">目标：收集本关全部记忆。注意不要碰到自己的火焰尾巴。</div><div id="log" class="logbox">游戏日志：系统启动。默认主角叫“小尾”，你也可以改名字。</div></div></div><div class="namebar"><label for="nameInput">主角名字</label><input id="nameInput" maxlength="8" value="小尾" /><button onclick="setHeroName()">设定</button></div><div class="controls"><div class="dpad"><button class="up" onclick="move(0,-1)">▲</button><button class="left" onclick="move(-1,0)">◀</button><button class="mid"></button><button class="right" onclick="move(1,0)">▶</button><button class="down" onclick="move(0,1)">▼</button></div><div class="ab"><button onclick="hint()">B</button><button onclick="aButton()">A</button></div></div><div class="small"><button onclick="resetGame()">START</button><button onclick="hint()">SELECT</button></div><div class="rule">方向键移动 · A关闭弹窗/补能量 · B提示 · 快走尾巴更长 · 碰到尾巴失败 · 双击不会放大</div></section><div class="foot">WLB · Sand Box · 复古掌机测试页</div></div>
<script>
let lastTouchEnd=0;document.addEventListener('touchend',function(e){const now=Date.now();if(now-lastTouchEnd<=320)e.preventDefault();lastTouchEnd=now},{passive:false});document.addEventListener('gesturestart',e=>e.preventDefault());
const screenEl=document.getElementById('screen'),field=document.getElementById('field'),player=document.getElementById('player'),msg=document.getElementById('msg'),log=document.getElementById('log'),scoreEl=document.getElementById('score'),needEl=document.getElementById('need'),energyEl=document.getElementById('energy'),levelEl=document.getElementById('level'),tailLenEl=document.getElementById('tailLen'),heroHud=document.getElementById('heroHud'),nameInput=document.getElementById('nameInput'),popup=document.getElementById('popup'),popTitle=document.getElementById('popTitle'),popText=document.getElementById('popText'),popBtn=document.getElementById('popBtn');
const cell=24,cols=16;let rows=9,px=1,py=1,score=0,energy=99,level=0,finished=false,paused=false,popAction='close',tail=[],targetTail=5,lastMoveAt=0,heroName=localStorage.getItem('wlb-hero-name')||'小尾',audioCtx=null;nameInput.value=heroName;
const levels=[
{title:'第一关：童年客厅',reward:'客厅灯亮了',start:[1,1],need:4,items:[{x:3,y:2,i:'卡',n:'红白机卡带',t:'失败了，就再来一局。童年的勇气，是重新开始。'},{x:10,y:2,i:'带',n:'磁带',t:'A面和B面之间，藏着一个年代的耐心。'},{x:4,y:6,i:'糖',n:'童年零食',t:'快乐有时不大，一小包就够。'},{x:11,y:5,i:'电',n:'座机电话',t:'以前的联系，需要记住号码。'}],walls:[[6,1],[6,2],[6,3],[2,4],[3,4],[4,4],[9,4],[10,4],[11,4],[8,6]],enemies:[[13,2],[12,7]]},
{title:'第二关：漫画书店',reward:'老夫子给你一张通行券',start:[1,1],need:4,items:[{x:3,y:2,i:'夫',n:'老夫子',t:'小漫画里有大人情，幽默也是智慧。'},{x:11,y:2,i:'书',n:'漫画书',t:'一页一页翻，时间就慢下来。'},{x:5,y:7,i:'报',n:'旧报纸',t:'小时候的世界，先从一张纸开始。'},{x:12,y:6,i:'笑',n:'笑话本',t:'能笑出来的日子，就还有弹性。'}],walls:[[5,1],[5,2],[5,3],[5,4],[9,3],[10,3],[11,3],[2,6],[3,6],[9,7],[10,7]],enemies:[[7,5],[13,3]]},
{title:'第三关：数码进化',reward:'暴龙兽完成进化',start:[1,7],need:5,items:[{x:2,y:2,i:'兽',n:'数码宝贝',t:'进化不是只变强，而是和伙伴一起承担。'},{x:10,y:2,i:'龙',n:'暴龙兽',t:'勇气亮起时，胆子就比困难大一点。'},{x:5,y:6,i:'机',n:'电子宠物机',t:'照顾一个小生命，是责任感的练习。'},{x:11,y:6,i:'光',n:'勇气徽章',t:'真正的力量，是被需要时站出来。'},{x:14,y:4,i:'网',n:'数码世界入口',t:'屏幕不是逃避，也可能是一扇门。'}],walls:[[4,2],[4,3],[4,4],[8,1],[8,2],[8,3],[12,4],[12,5],[12,6],[6,5],[7,5]],enemies:[[6,1],[9,6],[14,2]]},
{title:'第四关：街机厅',reward:'街机厅打出新纪录',start:[1,1],need:5,items:[{x:3,y:2,i:'币',n:'游戏币',t:'投进去的是硬币，练出来的是反应。'},{x:11,y:2,i:'拳',n:'街霸招式',t:'有些招，要练到手比脑子快。'},{x:13,y:5,i:'影',n:'录像带',t:'画面有噪点，记忆才有质感。'},{x:4,y:7,i:'歌',n:'点歌本',t:'一首歌，能把一整个年代叫回来。'},{x:10,y:6,i:'胜',n:'通关记录',t:'高手不是没输过，是知道下一局怎么赢。'}],walls:[[6,1],[6,2],[6,3],[6,4],[10,4],[11,4],[12,4],[4,5],[4,6],[8,7],[9,7]],enemies:[[8,2],[14,3],[7,7]]},
{title:'第五关：回到现在',reward:'时间线完成',start:[1,7],need:6,items:[{x:2,y:2,i:'照',n:'毕业照',t:'1988不是过去，是一条还在展开的时间线。'},{x:7,y:2,i:'家',n:'家里钥匙',t:'长大以后，家不只是地方，也是责任。'},{x:12,y:2,i:'工',n:'工作证',t:'工作把人磨硬，也把人磨清醒。'},{x:4,y:5,i:'心',n:'愿望',t:'小时候想快点长大，长大后学会慢慢完成。'},{x:9,y:6,i:'友',n:'老朋友',t:'有些关系不用常见，但一见就回到原点。'},{x:14,y:7,i:'未',n:'未来地图',t:'真正的升级，是把过去变成力量。'}],walls:[[5,1],[5,2],[5,3],[9,3],[10,3],[11,3],[2,5],[3,5],[12,5],[12,6],[6,7],[7,7]],enemies:[[8,1],[13,4],[10,7],[15,5]]}
];
function ensureAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume()}function beep(f,d,delay=0,type='square',gain=.025){ensureAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type;o.frequency.value=f;g.gain.value=gain;o.connect(g);g.connect(audioCtx.destination);const t=audioCtx.currentTime+delay;o.start(t);g.gain.exponentialRampToValueAtTime(.0001,t+d);o.stop(t+d+.02)}function ding(){beep(880,.05);beep(1180,.09,.05)}function failSound(){beep(220,.07,0,'square',.03);beep(160,.1,.07,'square',.03)}function rewardSound(){beep(660,.06);beep(880,.08,.08);beep(1320,.12,.18)}
function showPopup(title,text,action='close'){paused=true;popAction=action;popTitle.textContent=title;popText.textContent=text;popBtn.textContent=action==='next'?'A / 下一关':action==='retry'?'A / 重试':'A / 继续';popup.classList.add('show')}function closePopup(){popup.classList.remove('show');if(popAction==='next'){if(level<levels.length-1){level++;paused=false;loadLevel()}else{paused=true;showPopup('最终通关','五关完成。'+heroName+' 把过去变成了装备。','retry')}}else if(popAction==='retry'){paused=false;loadLevel()}else{paused=false;draw()}}function flash(){screenEl.classList.remove('flash');void screenEl.offsetWidth;screenEl.classList.add('flash')}function cur(){return levels[level]}function fit(){rows=Math.max(8,Math.floor(field.clientHeight/cell))}function syncHero(){const glyph=(heroName.trim()[0]||'小');player.textContent=glyph;heroHud.textContent=glyph;nameInput.value=heroName}function setHeroName(){heroName=(nameInput.value||'小尾').trim().slice(0,8)||'小尾';localStorage.setItem('wlb-hero-name',heroName);syncHero();say('主角已设定为“'+heroName+'”。');ding()}function tailTarget(dt){if(dt<160)return 10;if(dt<240)return 8;if(dt<380)return 6;if(dt<560)return 5;return 3}function say(t){msg.textContent=t}function add(t){log.innerHTML='游戏日志：'+t+'<br>'+log.innerHTML.replace(/^游戏日志：/,'').slice(0,170)}function blocked(x,y){const L=cur();return x<0||y<0||x>=cols||y>=rows||L.walls.some(([wx,wy])=>wx===x&&wy===y)}
function draw(){fit();field.querySelectorAll('.item,.wall,.enemy,.trail').forEach(n=>n.remove());const L=cur();L.walls.forEach(([x,y])=>{if(y<rows){let w=document.createElement('div');w.className='wall';w.style.left=x*cell+'px';w.style.top=y*cell+'px';field.appendChild(w)}});tail.forEach((seg,i)=>{let t=document.createElement('div');t.className='trail';t.textContent='火';t.style.left=seg[0]*cell+'px';t.style.top=seg[1]*cell+'px';t.style.opacity=String(Math.max(.28,1-i/(tail.length+1)));field.appendChild(t)});L.enemies.forEach(([x,y])=>{if(y<rows){let e=document.createElement('div');e.className='enemy';e.textContent='烦';e.style.left=x*cell+'px';e.style.top=y*cell+'px';field.appendChild(e)}});L.items.filter(m=>!m.got&&m.y<rows).forEach(m=>{let e=document.createElement('div');e.className='item';e.textContent=m.i;e.style.left=m.x*cell+'px';e.style.top=m.y*cell+'px';field.appendChild(e)});player.style.left=px*cell+'px';player.style.top=py*cell+'px';scoreEl.textContent=score;needEl.textContent=L.need;energyEl.textContent=energy;levelEl.textContent=level+1;tailLenEl.textContent=tail.length;syncHero()}
function collect(){const L=cur();const m=L.items.find(v=>!v.got&&v.x===px&&v.y===py);if(!m)return;m.got=true;score++;energy=Math.min(99,energy+8);ding();flash();add('获得 '+m.n+'。');showPopup('获得「'+m.n+'」',m.t,'close');if(score>=L.need){setTimeout(()=>{rewardSound();showPopup('★ STAGE CLEAR ★',L.reward+'。按 A 进入下一关。','next')},450)}}function failTail(){if(tail.some(([x,y])=>x===px&&y===py)){finished=true;failSound();flash();add('碰到自己的火焰尾巴，重试本关。');showPopup('TAIL HIT / 失败','你碰到了自己的火焰尾巴。尾巴是力量，也是危险。按 A 重试本关。','retry');return true}return false}function hitEnemy(){const L=cur();if(L.enemies.some(([x,y])=>x===px&&y===py)){energy=Math.max(0,energy-12);say('碰到烦恼怪，能量下降。');add('被烦恼怪干扰：-12能量。');failSound();flash()}}
function move(dx,dy){ensureAudio();if(finished||paused)return;const now=Date.now();if(lastMoveAt)targetTail=tailTarget(now-lastMoveAt);lastMoveAt=now;const ox=px,oy=py,nx=px+dx,ny=py+dy;if(blocked(nx,ny)){say('撞到障碍物了，换个方向。');energy=Math.max(0,energy-1);draw();return}px=nx;py=ny;tail.unshift([ox,oy]);while(tail.length>targetTail)tail.pop();energy=Math.max(0,energy-1);if(failTail()){draw();return}hitEnemy();collect();if(energy<=0&&!finished){finished=true;showPopup('ENERGY EMPTY / 失败','能量耗尽。按 A 重试本关。','retry')}draw()}function hint(){ensureAudio();if(paused){closePopup();return}const n=cur().items.find(m=>!m.got);if(n)say('提示：下一个记忆在 X'+n.x+' / Y'+n.y+' 附近。不要碰到火焰尾巴。');else say('本关记忆已收齐。按 A 进入下一关。')}function aButton(){ensureAudio();if(paused){closePopup();return}energy=Math.min(99,energy+12);say('A键启动：能量补充。小心尾巴。');beep(520,.04);beep(780,.06,.05);draw()}function loadLevel(){const L=cur();px=L.start[0];py=L.start[1];score=0;tail=[];targetTail=5;lastMoveAt=0;finished=false;paused=false;energy=Math.min(99,energy+8);L.items.forEach(m=>m.got=false);say(L.title+'。收集全部记忆即可过关；碰到尾巴会失败。');add('进入 '+L.title+'。');draw()}function resetGame(){level=0;energy=99;finished=false;paused=false;levels.forEach(L=>L.items.forEach(m=>m.got=false));popup.classList.remove('show');log.innerHTML='游戏日志：系统重启。默认主角叫“小尾”，你也可以改名字。';loadLevel()}
window.addEventListener('keydown',e=>{if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' ','Enter'].includes(e.key))e.preventDefault();if(e.key==='ArrowUp')move(0,-1);if(e.key==='ArrowDown')move(0,1);if(e.key==='ArrowLeft')move(-1,0);if(e.key==='ArrowRight')move(1,0);if(e.key===' '||e.key==='Enter')aButton()});window.addEventListener('resize',draw);syncHero();loadLevel();
</script>
</body></html>
