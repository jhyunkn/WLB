<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>WLB — 1988时光游戏机</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{touch-action:manipulation;overscroll-behavior:none}body{margin:0;min-height:100vh;font-family:"Courier New","Microsoft YaHei",monospace;color:#172033;background:radial-gradient(circle at 12% 10%,rgba(11,90,156,.12),transparent 30%),radial-gradient(circle at 90% 18%,rgba(244,180,0,.13),transparent 28%),linear-gradient(180deg,#edf7fb,#f8fbff)}button{touch-action:manipulation;user-select:none}.shell{width:min(760px,calc(100% - 24px));margin:0 auto;padding-bottom:36px}nav{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:16px 0}.brand{font-weight:900;font-size:14px}.back{text-decoration:none;border:1px solid #d9e2eb;border-radius:999px;background:#fff;padding:8px 12px;color:#667386;font-size:12px;font-weight:900}.hero{text-align:center;padding:16px 0 14px}.eyebrow{font-size:11px;letter-spacing:.16em;color:#667386;font-weight:900;margin-bottom:8px}h1{font-size:clamp(34px,8vw,62px);letter-spacing:-.07em;line-height:.95;margin:0 0 10px}.hero p{max-width:650px;margin:0 auto;color:#38485a;line-height:1.65;font-size:14px}.gameboy{background:linear-gradient(145deg,#eceee7,#c8ccc3);border:2px solid #aeb3aa;border-radius:34px 34px 76px 34px;padding:26px;box-shadow:0 28px 70px rgba(20,40,70,.18);position:relative}.top{display:flex;justify-content:space-between;color:#606860;font-size:11px;font-weight:900;margin-bottom:14px;letter-spacing:.08em}.led{display:inline-block;width:9px;height:9px;background:#9b1c31;border-radius:50%;box-shadow:0 0 10px #9b1c31;margin-right:6px}.screen-wrap{background:#2b3030;border-radius:22px;padding:16px;border:5px solid #747873}.screen{height:480px;background:#9bbc0f;border:4px solid #203b22;color:#306230;overflow:hidden;position:relative;box-shadow:inset 0 0 0 3px rgba(255,255,255,.16),inset 0 0 30px rgba(48,98,48,.25)}.hud{display:grid;grid-template-columns:1fr 1fr 1fr;border-bottom:3px solid #306230;padding:8px 10px;font-size:12px;font-weight:900}.field{height:300px;position:relative;background-image:linear-gradient(rgba(48,98,48,.16) 1px,transparent 1px),linear-gradient(90deg,rgba(48,98,48,.16) 1px,transparent 1px);background-size:24px 24px}.player,.item,.wall,.gate,.enemy{position:absolute;width:24px;height:24px;display:grid;place-items:center;font-size:15px;font-weight:900;line-height:1}.player{background:#306230;color:#9bbc0f;z-index:4}.item{font-size:16px;color:#306230;z-index:2;animation:blink 1.1s steps(2,end) infinite}.wall{background:rgba(48,98,48,.62);box-shadow:inset 0 0 0 4px rgba(155,188,15,.35)}.gate{background:#306230;color:#9bbc0f;z-index:2}.enemy{background:rgba(48,98,48,.28);border:2px solid #306230;color:#306230;z-index:3;animation:enemy 1.2s steps(2,end) infinite}@keyframes blink{50%{opacity:.45}}@keyframes enemy{50%{transform:translateY(2px)}}.msg{height:52px;border-top:3px solid #306230;border-bottom:3px solid #306230;padding:8px 10px;font-size:12px;line-height:1.35;font-weight:900;background:rgba(48,98,48,.08)}.logbox{height:76px;padding:8px 10px;font-size:11px;line-height:1.35;font-weight:900;overflow:hidden;background:rgba(48,98,48,.1)}.controls{display:grid;grid-template-columns:1fr 1fr;align-items:center;margin-top:22px}.dpad{width:154px;height:154px;position:relative}.dpad button,.ab button,.small button{font-family:inherit;cursor:pointer;border:none}.dpad button{position:absolute;background:#25292b;color:#fff;border-radius:10px;box-shadow:0 5px 0 #111;font-weight:900}.up,.down{left:52px;width:50px;height:52px}.up{top:0}.down{bottom:0}.left,.right{top:52px;width:52px;height:50px}.left{left:0}.right{right:0}.mid{left:52px;top:52px;width:50px;height:50px;box-shadow:none!important}.ab{display:flex;justify-content:flex-end;gap:18px}.ab button{width:64px;height:64px;border-radius:50%;background:#9b1c31;color:#fff;font-weight:900;box-shadow:0 6px 0 #56101c}.small{display:flex;gap:14px;justify-content:center;margin-top:18px}.small button{border-radius:999px;background:#777d76;color:#fff;padding:9px 22px;font-weight:900;box-shadow:0 4px 0 #474c48}.rule{margin-top:18px;text-align:center;color:#667386;font-size:12px;line-height:1.5}.foot{text-align:center;color:#667386;font-size:12px;margin-top:18px}@media(max-width:560px){.shell{width:min(100% - 16px,760px)}nav{align-items:flex-start;flex-direction:column}.hero{text-align:left}.gameboy{padding:16px;border-radius:24px 24px 54px 24px}.screen-wrap{padding:10px}.screen{height:430px}.field{height:260px}.hud{font-size:10px}.msg{font-size:11px}.dpad{transform:scale(.82);transform-origin:left center}.ab button{width:54px;height:54px}.controls{gap:6px}.top{font-size:9px}}
</style>
</head>
<body>
<div class="shell">
<nav><div class="brand">WLB · 第四页 · 1988时光游戏机</div><a class="back" href="./index.html">← 返回目录</a></nav>
<section class="hero"><div class="eyebrow">SAND BOX / 中文小游戏</div><h1>1988 时光收集机</h1><p>五关复古掌机小游戏。收集童年碎片，避开烦恼怪，到达出口。每一关都是一段记忆。</p></section>
<section class="gameboy">
<div class="top"><span>DOT MATRIX SOUND</span><span><i class="led"></i>电源</span></div>
<div class="screen-wrap"><div class="screen"><div class="hud"><div>关卡 <span id="level">1</span>/5</div><div>记忆 <span id="score">0</span>/<span id="need">4</span></div><div>能量 <span id="energy">99</span></div></div><div id="field" class="field"><div id="player" class="player">人</div></div><div id="msg" class="msg">按方向键移动。收集本关所有记忆后，去“门”。</div><div id="log" class="logbox">游戏日志：系统启动。1988时间线打开。</div></div></div>
<div class="controls"><div class="dpad"><button class="up" onclick="move(0,-1)">▲</button><button class="left" onclick="move(-1,0)">◀</button><button class="mid"></button><button class="right" onclick="move(1,0)">▶</button><button class="down" onclick="move(0,1)">▼</button></div><div class="ab"><button onclick="hint()">B</button><button onclick="boost()">A</button></div></div>
<div class="small"><button onclick="resetGame()">START</button><button onclick="hint()">SELECT</button></div>
<div class="rule">玩法：方向键移动 · A补能量 · B提示 · 收集全部碎片后进入“门” · 双击不会放大页面</div>
</section>
<p class="foot">WLB · Sand Box · 复古测试页</p>
</div>
<script>
let lastTouchEnd=0;document.addEventListener('touchend',function(e){let now=Date.now();if(now-lastTouchEnd<=320)e.preventDefault();lastTouchEnd=now},{passive:false});document.addEventListener('gesturestart',e=>e.preventDefault());
const field=document.getElementById('field'),player=document.getElementById('player'),msg=document.getElementById('msg'),log=document.getElementById('log'),scoreEl=document.getElementById('score'),needEl=document.getElementById('need'),energyEl=document.getElementById('energy'),levelEl=document.getElementById('level');
const cell=24,cols=18;let rows=12,px=1,py=1,score=0,energy=99,level=0,finished=false;
const levels=[
{title:'第一关：童年客厅',start:[1,1],gate:[16,11],need:4,items:[{x:4,y:2,i:'卡',n:'红白机卡带',t:'红白机卡带：失败了，就再来一局。'},{x:10,y:2,i:'带',n:'磁带',t:'磁带：A面和B面之间，藏着一个年代的耐心。'},{x:5,y:8,i:'糖',n:'童年零食',t:'零食：快乐有时很小，一小包就够。'},{x:13,y:7,i:'电',n:'座机电话',t:'座机电话：以前的联系，需要记号码，也需要等待。'}],walls:[[7,1],[7,2],[7,3],[2,5],[3,5],[4,5],[11,5],[12,5],[13,5],[9,8],[10,8]],enemies:[[15,3]]},
{title:'第二关：漫画书店',start:[1,1],gate:[16,10],need:4,items:[{x:3,y:3,i:'夫',n:'老夫子',t:'老夫子：小漫画里有大人情，幽默也是智慧。'},{x:8,y:2,i:'书',n:'漫画书',t:'漫画书：一页一页翻，时间就慢下来。'},{x:13,y:4,i:'报',n:'旧报纸',t:'旧报纸：世界很大，但小时候先从一张纸开始。'},{x:6,y:10,i:'笑',n:'笑话本',t:'笑话本：能笑出来的日子，就还有弹性。'}],walls:[[5,1],[5,2],[5,3],[5,4],[9,5],[10,5],[11,5],[12,5],[2,8],[3,8],[14,8],[15,8]],enemies:[[8,8],[13,2]]},
{title:'第三关：数码进化',start:[1,10],gate:[16,1],need:5,items:[{x:2,y:2,i:'兽',n:'数码宝贝',t:'数码宝贝：进化不是变强而已，是和伙伴一起承担。'},{x:8,y:3,i:'龙',n:'暴龙兽',t:'暴龙兽：勇气徽章亮起，胆子就比困难大一点。'},{x:13,y:7,i:'机',n:'电子宠物机',t:'电子宠物机：照顾一个小生命，是责任感的练习。'},{x:4,y:9,i:'光',n:'徽章',t:'徽章：真正的力量，是被需要时站出来。'},{x:10,y:10,i:'网',n:'数码世界入口',t:'入口：屏幕不是逃避，也可能是一扇门。'}],walls:[[3,4],[4,4],[5,4],[8,1],[8,2],[8,3],[8,4],[12,6],[12,7],[12,8],[6,8],[7,8],[15,10]],enemies:[[6,2],[14,4],[9,8]]},
{title:'第四关：街机厅',start:[1,1],gate:[16,11],need:5,items:[{x:4,y:3,i:'币',n:'游戏币',t:'游戏币：投进去的是硬币，练出来的是反应。'},{x:10,y:2,i:'拳',n:'街霸招式',t:'街霸招式：有些招，要练到手比脑子快。'},{x:14,y:5,i:'影',n:'录像带',t:'录像带：画面有噪点，记忆才有质感。'},{x:3,y:10,i:'歌',n:'点歌本',t:'点歌本：一首歌能把一整个年代叫回来。'},{x:11,y:9,i:'胜',n:'通关记录',t:'通关记录：高手不是没输过，是知道下一局怎么赢。'}],walls:[[6,1],[6,2],[6,3],[6,4],[10,5],[11,5],[12,5],[13,5],[4,7],[5,7],[6,7],[14,8],[14,9],[9,10]],enemies:[[8,2],[15,3],[7,9]]},
{title:'第五关：回到现在',start:[1,10],gate:[16,2],need:6,items:[{x:2,y:2,i:'照',n:'毕业照',t:'毕业照：1988不是过去，是一条还在展开的时间线。'},{x:7,y:2,i:'家',n:'家里钥匙',t:'钥匙：长大以后，家不只是地方，也是责任。'},{x:12,y:3,i:'工',n:'工作证',t:'工作证：工作把人磨硬，也把人磨清醒。'},{x:4,y:6,i:'心',n:'愿望',t:'愿望：小时候想快点长大，长大后学会慢慢完成。'},{x:9,y:8,i:'友',n:'老朋友',t:'老朋友：有些关系不用常见，但一见就回到原点。'},{x:14,y:10,i:'未',n:'未来地图',t:'未来地图：真正的升级，是把过去变成力量。'}],walls:[[5,1],[5,2],[5,3],[9,4],[10,4],[11,4],[12,4],[2,7],[3,7],[4,7],[7,9],[8,9],[15,7],[15,8]],enemies:[[8,1],[13,6],[6,11],[11,9]]}
];
function fit(){rows=Math.max(10,Math.floor(field.clientHeight/cell))}function current(){return levels[level]}function draw(){fit();field.querySelectorAll('.item,.wall,.gate,.enemy').forEach(n=>n.remove());let L=current();L.walls.forEach(([x,y])=>{if(y<rows){let w=document.createElement('div');w.className='wall';w.style.left=x*cell+'px';w.style.top=y*cell+'px';field.appendChild(w)}});L.enemies.forEach(([x,y])=>{if(y<rows){let e=document.createElement('div');e.className='enemy';e.textContent='烦';e.style.left=x*cell+'px';e.style.top=y*cell+'px';field.appendChild(e)}});L.items.filter(m=>!m.got&&m.y<rows).forEach(m=>{let e=document.createElement('div');e.className='item';e.textContent=m.i;e.style.left=m.x*cell+'px';e.style.top=m.y*cell+'px';field.appendChild(e)});if(score>=L.need){let g=document.createElement('div');g.className='gate';g.textContent='门';g.style.left=L.gate[0]*cell+'px';g.style.top=L.gate[1]*cell+'px';field.appendChild(g)}player.style.left=px*cell+'px';player.style.top=py*cell+'px';scoreEl.textContent=score;needEl.textContent=L.need;energyEl.textContent=energy;levelEl.textContent=level+1}
function blocked(x,y){let L=current();return x<0||y<0||x>=cols||y>=rows||L.walls.some(([wx,wy])=>wx===x&&wy===y)}function move(dx,dy){if(finished)return;let nx=px+dx,ny=py+dy;if(blocked(nx,ny)){say('撞到墙了。换一个方向。');energy=Math.max(0,energy-1);draw();return}px=nx;py=ny;energy=Math.max(0,energy-1);hitEnemy();collect();gate();if(energy<=0&&!finished){say('能量耗尽。按 START 重新开始。');finished=true}draw()}
function hitEnemy(){let L=current();if(L.enemies.some(([x,y])=>x===px&&y===py)){energy=Math.max(0,energy-12);say('碰到烦恼怪，能量下降。绕开它。');add('被烦恼怪干扰：-12能量。')}}function collect(){let L=current();let m=L.items.find(v=>!v.got&&v.x===px&&v.y===py);if(!m)return;m.got=true;score++;energy=Math.min(99,energy+7);say(m.t);add('获得：'+m.n)}function gate(){let L=current();if(px===L.gate[0]&&py===L.gate[1]){if(score<L.need){say('门还没打开。先收集全部记忆。');return}if(level<levels.length-1){level++;loadLevel();return}finished=true;say('最终通关：你把童年、漫画、数码世界、街机厅和现在连接起来了。过去不是负担，是装备。');add('结局：五关完成。时间线稳定。')}}
function loadLevel(){let L=current();px=L.start[0];py=L.start[1];score=0;L.items.forEach(m=>m.got=false);energy=Math.min(99,energy+18);say(L.title+'。收集本关所有记忆。');add('进入：'+L.title);draw()}function say(t){msg.textContent=t}function add(t){log.innerHTML=t+'<br>'+log.innerHTML}function hint(){if(finished){say('按 START 可以重新开始。');return}let L=current();let n=L.items.find(m=>!m.got);if(n)say('提示：下一个碎片在 X'+n.x+' / Y'+n.y+' 附近。');else say('全部收集完成。去“门”进入下一关。')}function boost(){if(finished)return;energy=Math.min(99,energy+12);say('A键启动：能量补充。继续前进。');draw()}function resetGame(){level=0;energy=99;finished=false;levels.forEach(L=>L.items.forEach(m=>m.got=false));log.innerHTML='游戏日志：系统重启。1988时间线打开。';loadLevel()}
window.addEventListener('keydown',e=>{if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();if(e.key==='ArrowUp')move(0,-1);if(e.key==='ArrowDown')move(0,1);if(e.key==='ArrowLeft')move(-1,0);if(e.key==='ArrowRight')move(1,0);if(e.key===' ')boost();if(e.key==='Enter')resetGame()});window.addEventListener('resize',draw);loadLevel();
</script>
</body>
</html>
